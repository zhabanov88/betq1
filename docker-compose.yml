version: '3.9'

services:

  # ───────── BetQuant App ─────────
  app:
    build: .
    container_name: betquant-app
    ports:
      - "23000:3000"
    env_file: .env
    environment:
      - PG_HOST=postgres
      - CH_HOST=http://clickhouse:8123
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks: [bq]

  # ───────── PostgreSQL ─────────
  postgres:
    image: postgres:16-alpine
    container_name: betquant-pg
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-betquant}
      POSTGRES_USER:     ${PG_USER:-betquant}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-betquant123}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-scripts/01_init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${PG_USER:-betquant}"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    networks: [bq]

  # ───────── ClickHouse ─────────
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: betquant-ch
    environment:
      CLICKHOUSE_DB:       ${CH_DATABASE:-betquant}
      CLICKHOUSE_USER:     ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-}
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./init-scripts/02_init_clickhouse.sql:/docker-entrypoint-initdb.d/02_init.sql
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8123/ping"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    networks: [bq]

  # ───────── Redis (опционально) ─────────
  redis:
    image: redis:7-alpine
    container_name: betquant-redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    command: redis-server --appendonly yes --maxmemory 256mb
    restart: unless-stopped
    networks: [bq]

  # ───────── Nginx ─────────
  nginx:
    image: nginx:alpine
    container_name: betquant-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [app]
    restart: unless-stopped
    networks: [bq]

volumes:
  pg-data:
  ch-data:
  redis-data:

networks:
  bq:
    driver: bridge
