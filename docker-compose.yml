version: '3.9'

services:

  # ───────── BetQuant App ─────────
  app:
    build: .
    container_name: betquant-app
    ports:
      - "23000:3000"
    env_file: .env
    environment:
      - PORT=3000
      - BDL_API_KEY=83185bbf-4d77-4417-9646-2919c88fa229
      - NODE_ENV=production
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=betquant
      - PG_USER=betquant
      - PG_PASSWORD=betquant123
      - CH_HOST=http://clickhouse:8123
      - CH_USER=default
      - CH_PASSWORD=
      - CH_DATABASE=betquant
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [bq]

  # ───────── PostgreSQL ─────────
  postgres:
    image: postgres:16-alpine
    container_name: betquant-pg
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-betquant}
      POSTGRES_USER:     ${PG_USER:-betquant}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-betquant123}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-scripts/01_init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-betquant}"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    networks: [bq]

  # ───────── ClickHouse ─────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: betquant-ch
    environment:
      CLICKHOUSE_DB:                        ${CH_DATABASE:-betquant}
      CLICKHOUSE_USER:                      ${CH_USER:-default}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ch-data:/var/lib/clickhouse
      - ch-logs:/var/log/clickhouse-server
      - ./init-scripts/02_init_clickhouse.sql:/docker-entrypoint-initdb.d/02_legacy.sql
      - ./init-scripts/02_init_clickhouse_extended.sql:/docker-entrypoint-initdb.d/03_extended.sql
      # Конфиг: разрешаем multistatement через HTTP и доступ с любого IP
      - ./clickhouse-config/users.xml:/etc/clickhouse-server/users.d/custom-users.xml:ro
      - ./clickhouse-config/config.xml:/etc/clickhouse-server/config.d/custom-config.xml:ro
    ports:
      - "8123:8123"   # HTTP API (используется приложением и ETL)
      - "8132:8123"   # дублируем HTTP на 8132 для прямого доступа браузера
      - "9000:9000"   # Native TCP (clickhouse-client)
      - "9009:9009"   # Interserver (репликация, опционально)
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    networks: [bq]

  # ───────── ClickHouse UI (tabix) — лёгкий веб-интерфейс ─────────
  # Доступ: http://SERVER_IP:28124
  # Подключение внутри: host=clickhouse, port=8123, user=default, pass=<пусто>
  clickhouse-ui:
    image: spoonest/clickhouse-tabix-web-client:stable
    container_name: betquant-ch-ui
    environment:
      - CSP_CLICKHOUSE_HOST=http://clickhouse:8123
      - CSP_CLICKHOUSE_USER=default
      - CSP_CLICKHOUSE_PASSWORD=
    ports:
      - "28124:80"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks: [bq]

  # ───────── CloudBeaver — полный DBeaver веб (PostgreSQL + ClickHouse) ─────────
  # Доступ: http://SERVER_IP:28978
  # ВАЖНО: теперь в сети bq — видит clickhouse и postgres по имени сервиса
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: betquant-cloudbeaver
    ports:
      - "28078:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [bq]    # ← ИСПРАВЛЕНО: было shared-network, теперь bq

  # ───────── ETL v1 ─────────
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: betquant-etl
    environment:
      CH_HOST:     http://clickhouse:8123
      CH_DB:       betquant
      CH_USER:     default
      CH_PASS:     ""
      ETL_SEASONS: "3"
      ETL_LEAGUES: top
      BDL_API_KEY: "83185bbf-4d77-4417-9646-2919c88fa229"
      FOOTBALLDATA_ORG_TOKEN: "${FOOTBALLDATA_ORG_TOKEN:-}"
      ETL_XG_SOURCE:          "${ETL_XG_SOURCE:-statsbomb}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - etl-cache:/opt/etl-cache
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    profiles: ["etl"]
    networks: [bq]

  # ───────── ETL v2 ─────────
  etl-v2:
    build:
      context: .
      dockerfile: sports-etl-v2/Dockerfile.etl_v2
    container_name: betquant-etl-v2
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB:  betquant
      PYTHONUNBUFFERED: "1"
    volumes:
      - etl-cache:/app/cache
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    profiles: ["etl-v2"]
    networks: [bq]

  # ───────── Redis ─────────
  redis:
    image: redis:7-alpine
    container_name: betquant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks: [bq]

  # ───────── Nginx ─────────
  nginx:
    image: nginx:alpine
    container_name: betquant-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks: [bq]
# ───────── Realtime Collector ─────────
  realtime:
    build: .                              # тот же Dockerfile что и app
    container_name: betquant-realtime
    command: node data-collectors/realtime-collector.js
    env_file: .env
    environment:
      - CH_HOST=http://clickhouse:8123
      - CH_USER=default
      - CH_PASSWORD=
      - CH_DATABASE=betquant
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped              # ← автоперезапуск при docker compose up
    networks: [bq]
    labels:
      - "com.betquant.service=realtime-collector"
      - "com.betquant.description=BSD + Odds API data collector"
volumes:
  pg-data:
  ch-data:
  ch-logs:
  redis-data:
  etl-cache:
  cloudbeaver-data:

networks:
  bq:
    driver: bridge